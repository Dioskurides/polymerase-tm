{% set name = "polymerase-tm" %}
{% set version = "2.1.4" %}
{% set python_min = "3.9" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 8c827082cbf485a33d9c4da8b2e755d3cfb4673818576ffe897517aabb8bc4f9d

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - polymerase-tm = polymerase_tm.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - biopython >=1.80
    - matplotlib-base >=3.5
    - seaborn >=0.12
    - numpy >=1.20

test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
    - polymerase_tm
  commands:
    - polymerase-tm --help
    - polymerase-tm ATGTCCCTGCTCTTCTCTCGATGCAA
    - pip check

about:
  home: https://github.com/Dioskurides/polymerase-tm
  summary: Exact reproduction of the NEB Tm Calculator for PCR primer analysis
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Dioskurides
