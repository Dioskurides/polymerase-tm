{% set name = "polymerase-tm" %}
{% set version = "2.2.0" %}
{% set python_min = "3.9" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: a69ce845ac88efc5c5d448c4cd9f0a5586f5321b9a89dc21fb66b889557a5b042

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - polymerase-tm = polymerase_tm.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - biopython >=1.80
    - matplotlib-base >=3.5
    - seaborn >=0.12
    - numpy >=1.20

test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
    - polymerase_tm
  commands:
    - polymerase-tm --help
    - polymerase-tm ATGTCCCTGCTCTTCTCTCGATGCAA
    - pip check

about:
  home: https://github.com/Dioskurides/polymerase-tm
  summary: Exact reproduction of the NEB Tm Calculator for PCR primer analysis
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Dioskurides
